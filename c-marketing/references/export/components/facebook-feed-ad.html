<div class="fb-ad-card" style="font-family: Helvetica, Arial, sans-serif; background: #ffffff; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); max-width: 500px; overflow: hidden;">

  <!-- Header: Avatar + Page Name + Sponsored + Menu -->
  <div style="padding: 12px 16px 0 16px; display: flex; align-items: flex-start;">
    <!-- Page Avatar -->
    <div style="width: 40px; height: 40px; min-width: 40px; border-radius: 50%; overflow: hidden; margin-right: 8px; background: #d8dadf;">
      <img src="{{PAGE_IMAGE}}" alt="" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: block;" onerror="this.style.display='none';">
    </div>
    <!-- Name + Sponsored row -->
    <div style="flex: 1; min-width: 0;">
      <div style="font-size: 15px; font-weight: 600; color: #050505; line-height: 20px; cursor: pointer;">{{PAGE_NAME}}</div>
      <div style="display: flex; align-items: center; gap: 4px; margin-top: 1px;">
        <span style="font-size: 13px; font-weight: 400; color: #65676b; line-height: 16px;">Sponset</span>
        <span style="display: inline-flex; align-items: center; color: #65676b;">
          <!-- Globe icon -->
          <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor" style="display: block;"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm-.5 14.47A6.5 6.5 0 0 1 1.5 8c0-.8.15-1.57.41-2.28L5.5 9.5v.5c0 .83.67 1.5 1.5 1.5v2.97zm4.93-1.97A1.49 1.49 0 0 0 11 11.5h-.5V10c0-.55-.45-1-1-1H6V7.5h1.5c.55 0 1-.45 1-1V5h1.5c.83 0 1.5-.67 1.5-1.5v-.29A6.5 6.5 0 0 1 14.5 8a6.48 6.48 0 0 1-2.07 4.5z"/></svg>
        </span>
      </div>
    </div>
    <!-- Three-dot (horizontal ellipsis) menu -->
    <div style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; margin: -4px -8px 0 0; flex-shrink: 0;">
      <svg viewBox="0 0 20 20" width="20" height="20" fill="#65676b"><circle cx="4" cy="10" r="1.75"/><circle cx="10" cy="10" r="1.75"/><circle cx="16" cy="10" r="1.75"/></svg>
    </div>
  </div>

  <!-- Primary Text -->
  <div style="padding: 8px 16px 12px 16px; font-size: 15px; font-weight: 400; color: #050505; line-height: 20px; white-space: pre-wrap; word-wrap: break-word;">{{PRIMARY_TEXT}}</div>

  <!-- Media Area (1200x628 = 1.91:1, padding-top = 628/1200*100 = 52.33%) -->
  <div style="position: relative; width: 100%; padding-top: 52.33%; background: linear-gradient(135deg, #d8dadf 0%, #bec3c9 100%); overflow: hidden;">
    <img src="{{IMAGE_URL}}" alt="" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block;" onerror="this.style.display='none';">
  </div>

  <!-- Link Preview Bar -->
  <div style="background: #f0f2f5; padding: 12px 16px; display: flex; align-items: center; gap: 16px;">
    <div style="flex: 1; min-width: 0; overflow: hidden;">
      <div style="font-size: 13px; font-weight: 400; color: #65676b; line-height: 16px; text-transform: uppercase; letter-spacing: 0.03em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{DISPLAY_URL}}</div>
      <div style="font-size: 17px; font-weight: 600; color: #050505; line-height: 22px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{HEADLINE}}</div>
      <div style="font-size: 14px; font-weight: 400; color: #65676b; line-height: 18px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{DESCRIPTION}}</div>
    </div>
    <button style="flex-shrink: 0; background: #e4e6eb; color: #050505; font-size: 15px; font-weight: 600; font-family: Helvetica, Arial, sans-serif; border: none; border-radius: 6px; padding: 0 16px; height: 36px; cursor: pointer; white-space: nowrap; line-height: 36px;">{{CTA_TEXT}}</button>
  </div>

  <!-- Reactions + Comment/Share Counts -->
  <div style="padding: 10px 16px 0 16px; display: flex; align-items: center; justify-content: space-between;">
    <!-- Reaction emoji circles + count -->
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="display: flex; align-items: center;">
        <!-- Like reaction (blue circle, white thumbs-up) -->
        <span style="width: 18px; height: 18px; border-radius: 50%; box-shadow: 0 0 0 2px #ffffff; display: inline-flex; align-items: center; justify-content: center; background: #1877F2; position: relative; z-index: 3;">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="#ffffff"><path d="M10.97 8.26l-.6 3.89a.68.68 0 0 1-.67.58H5.65V7.42h.88a.7.7 0 0 0 .65-.46l1.03-2.73a.36.36 0 0 1 .52-.19c.31.16.5.47.5.82V6.5h2.4a.67.67 0 0 1 .66.79l-.32.97z"/></svg>
        </span>
        <!-- Love reaction (red circle, white heart) -->
        <span style="width: 18px; height: 18px; border-radius: 50%; box-shadow: 0 0 0 2px #ffffff; display: inline-flex; align-items: center; justify-content: center; background: #F33E58; position: relative; z-index: 2; margin-left: -4px;">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="#ffffff"><path d="M8 13.1S3 9.9 3 6.3C3 4.3 4.5 3 6.1 3c.9 0 1.4.4 1.9.9.5-.5 1-.9 1.9-.9C11.5 3 13 4.3 13 6.3c0 3.6-5 6.8-5 6.8z"/></svg>
        </span>
      </div>
      <span style="font-size: 15px; font-weight: 400; color: #65676b; line-height: 20px;">{{REACTION_COUNT}}</span>
    </div>
    <!-- Comment + Share counts -->
    <div style="display: flex; align-items: center; gap: 8px;">
      <span style="font-size: 15px; font-weight: 400; color: #65676b; line-height: 20px; cursor: pointer;">{{COMMENT_COUNT}} kommentarer</span>
      <span style="font-size: 15px; font-weight: 400; color: #65676b; line-height: 20px; cursor: pointer;">{{SHARE_COUNT}} delinger</span>
    </div>
  </div>

  <!-- Action Bar: Liker / Kommenter / Del -->
  <div style="margin: 8px 16px 0 16px; border-top: 1px solid #ced0d4; display: flex; align-items: center; height: 44px;">
    <!-- Liker button -->
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; height: 44px; cursor: pointer; border-radius: 4px;">
      <!-- Thumbs up (outline) -->
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#65676b"><path d="M15.08 9.56h3.32c.55 0 1.04.3 1.3.77.26.47.24 1.03-.05 1.48l-3.56 5.6a1.5 1.5 0 0 1-1.26.69H8.5V9.56l2.26-5.3c.12-.28.4-.46.7-.46h.18c.83 0 1.5.67 1.5 1.5v3.8l1.94.46zm-8.58 0v8.54H4.25a.75.75 0 0 1-.75-.75V10.3a.75.75 0 0 1 .75-.75H6.5z"/></svg>
      <span style="font-size: 15px; font-weight: 600; color: #65676b; line-height: 20px;">Liker</span>
    </div>
    <!-- Kommenter button -->
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; height: 44px; cursor: pointer; border-radius: 4px;">
      <!-- Comment speech bubble (outline) -->
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#65676b"><path d="M12 3C6.5 3 2 6.58 2 11c0 1.76.66 3.38 1.76 4.72L2.5 21l5.18-1.72C8.94 19.74 10.42 20 12 20c5.5 0 10-3.58 10-8s-4.5-9-10-9zm0 15c-1.38 0-2.7-.26-3.88-.72l-.64-.26-3.1 1.03.76-2.87-.36-.52A6.3 6.3 0 0 1 4 11c0-3.86 3.58-7 8-7s8 3.14 8 7-3.58 7-8 7z"/></svg>
      <span style="font-size: 15px; font-weight: 600; color: #65676b; line-height: 20px;">Kommenter</span>
    </div>
    <!-- Del (Share) button -->
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; height: 44px; cursor: pointer; border-radius: 4px;">
      <!-- Share arrow (curved forward arrow) -->
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#65676b"><path d="M12 3.73l7.28 7.04H14.5v1.46c0 2.93-1.66 5.58-4.22 6.87.28-1.1.42-2.22.42-3.33v-4.99H5.72L12 3.73zM12 1L2.5 11.68h5.2v3.55c0 1.72-.35 3.43-1.04 5.02-.3.7.12 1.5.87 1.67.14.03.27.05.4.05 1.5 0 3-.47 4.25-1.28 2.75-1.78 4.32-4.65 4.32-7.94v-.36h4.5L12 1z"/></svg>
      <span style="font-size: 15px; font-weight: 600; color: #65676b; line-height: 20px;">Del</span>
    </div>
  </div>

  <!-- Bottom padding -->
  <div style="height: 4px;"></div>

</div>
