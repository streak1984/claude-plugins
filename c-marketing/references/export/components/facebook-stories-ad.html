<!-- Facebook/Instagram Stories Ad — 9:16 (360x640) -->
<div class="fb-stories-ad-wrapper">
  <style>
    .fb-stories-ad-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a1a;
      padding: 24px;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .fb-stories-ad {
      position: relative;
      width: 360px;
      height: 640px;
      border-radius: 12px;
      overflow: hidden;
      background-color: #232323;
      background-image: url('{{IMAGE_URL}}');
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }

    /* Fallback gradient when no image */
    .fb-stories-ad--no-image {
      background-image: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%) !important;
    }

    /* Overlay gradient — darkens top and bottom */
    .fb-stories-ad__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.4) 0%,
        transparent 30%,
        transparent 60%,
        rgba(0, 0, 0, 0.6) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ---- Progress bars ---- */
    .fb-stories-ad__progress {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 4px;
      padding: 8px 8px 0;
      z-index: 4;
    }

    .fb-stories-ad__progress-bar {
      flex: 1;
      height: 2px;
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.35);
      overflow: hidden;
    }

    .fb-stories-ad__progress-bar--active {
      background: rgba(255, 255, 255, 0.9);
    }

    /* ---- Header ---- */
    .fb-stories-ad__header {
      position: absolute;
      top: 18px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      z-index: 3;
    }

    .fb-stories-ad__avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.7);
      background-color: rgba(255, 255, 255, 0.15);
      background-image: url('{{PAGE_IMAGE}}');
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }

    .fb-stories-ad__page-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .fb-stories-ad__page-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .fb-stories-ad__sponsored {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.2;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .fb-stories-ad__header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .fb-stories-ad__header-btn {
      color: #fff;
      opacity: 0.85;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.4));
    }

    /* ---- Overlay headline ---- */
    .fb-stories-ad__headline {
      position: absolute;
      left: 16px;
      right: 16px;
      z-index: 3;
      background: rgba(0, 0, 0, 0.3);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      padding: 16px;
      border-radius: 8px;
    }

    .fb-stories-ad__headline--top {
      top: 72px;
    }

    .fb-stories-ad__headline--center {
      top: 50%;
      transform: translateY(-50%);
    }

    .fb-stories-ad__headline--bottom {
      bottom: 100px;
    }

    .fb-stories-ad__headline-text {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      margin: 0;
    }

    /* ---- Swipe-up CTA ---- */
    .fb-stories-ad__cta {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .fb-stories-ad__cta-chevron {
      color: #fff;
      opacity: 0.9;
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.4));
      animation: fb-stories-ad-bounce 2s ease-in-out infinite;
    }

    @keyframes fb-stories-ad-bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    .fb-stories-ad__cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.2);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
      white-space: nowrap;
      cursor: pointer;
    }
  </style>

  <div class="fb-stories-ad">
    <!-- Dark overlay gradient -->
    <div class="fb-stories-ad__overlay"></div>

    <!-- Progress bars (3 segments, first active) -->
    <div class="fb-stories-ad__progress">
      <div class="fb-stories-ad__progress-bar fb-stories-ad__progress-bar--active"></div>
      <div class="fb-stories-ad__progress-bar"></div>
      <div class="fb-stories-ad__progress-bar"></div>
    </div>

    <!-- Header: avatar + page name + Sponset -->
    <div class="fb-stories-ad__header">
      <div class="fb-stories-ad__avatar"></div>
      <div class="fb-stories-ad__page-info">
        <span class="fb-stories-ad__page-name">{{PAGE_NAME}}</span>
        <span class="fb-stories-ad__sponsored">Sponset</span>
      </div>
      <div class="fb-stories-ad__header-actions">
        <!-- More (three-dot) icon -->
        <svg class="fb-stories-ad__header-btn" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <circle cx="3" cy="8" r="1.5"/>
          <circle cx="8" cy="8" r="1.5"/>
          <circle cx="13" cy="8" r="1.5"/>
        </svg>
        <!-- Close icon -->
        <svg class="fb-stories-ad__header-btn" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M3.7 3.7a1 1 0 0 1 1.4 0L8 6.6l2.9-2.9a1 1 0 1 1 1.4 1.4L9.4 8l2.9 2.9a1 1 0 0 1-1.4 1.4L8 9.4l-2.9 2.9a1 1 0 0 1-1.4-1.4L6.6 8 3.7 5.1a1 1 0 0 1 0-1.4z"/>
        </svg>
      </div>
    </div>

    <!-- Overlay headline — swap modifier class for position: --top / --center / --bottom -->
    <div class="fb-stories-ad__headline fb-stories-ad__headline--{{OVERLAY_POSITION}}">
      <p class="fb-stories-ad__headline-text">{{OVERLAY_HEADLINE}}</p>
    </div>

    <!-- Swipe-up CTA -->
    <div class="fb-stories-ad__cta">
      <!-- Upward chevron -->
      <svg class="fb-stories-ad__cta-chevron" width="20" height="12" viewBox="0 0 20 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2,10 10,2 18,10"/>
      </svg>
      <span class="fb-stories-ad__cta-btn">{{CTA_TEXT}}</span>
    </div>
  </div>
</div>
