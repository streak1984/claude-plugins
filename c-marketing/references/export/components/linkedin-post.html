<!-- LinkedIn Organic Post Component -->
<div class="li-post-wrapper" style="background:#f4f2ee;padding:24px;display:flex;justify-content:center;font-family:-apple-system,system-ui,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;">
  <style scoped>
    .li-post * { box-sizing: border-box; margin: 0; padding: 0; }
    .li-post a { text-decoration: none; color: inherit; }
    .li-post-action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 8px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: rgba(0,0,0,0.6);
      transition: background 0.15s ease;
      flex: 1;
      height: 44px;
    }
    .li-post-action-btn:hover {
      background: rgba(0,0,0,0.08);
    }
    .li-post-action-btn svg {
      flex-shrink: 0;
    }
    .li-see-more {
      font-size: 14px;
      font-weight: 600;
      color: rgba(0,0,0,0.6);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .li-see-more:hover {
      color: #0A66C2;
      text-decoration: underline;
    }
    .li-hashtag {
      color: #0A66C2;
      font-weight: 600;
      cursor: pointer;
    }
    .li-hashtag:hover {
      text-decoration: underline;
    }
    .li-stats-link {
      cursor: pointer;
    }
    .li-stats-link:hover {
      text-decoration: underline;
      color: #0A66C2;
    }
  </style>

  <div class="li-post" style="background:#ffffff;border:1px solid #e0dfdc;border-radius:8px;box-shadow:0 0 0 1px rgba(0,0,0,0.08);max-width:552px;width:100%;overflow:hidden;">

    <!-- ========== HEADER ========== -->
    <div style="display:flex;align-items:flex-start;padding:12px 16px 0 16px;">

      <!-- Profile Image -->
      <div style="flex-shrink:0;width:48px;height:48px;border-radius:50%;overflow:hidden;margin-right:8px;background:#e0dfdc;display:flex;align-items:center;justify-content:center;">
        <img src="{{PROFILE_IMAGE}}" alt="" style="width:48px;height:48px;border-radius:50%;object-fit:cover;"
          onerror="this.style.display='none';this.parentElement.innerHTML='<span style=&quot;font-size:18px;font-weight:600;color:rgba(0,0,0,0.55);line-height:48px;&quot;>TN</span>';">
      </div>

      <!-- Name / Headline / Timestamp -->
      <div style="flex:1;min-width:0;padding-top:1px;">
        <div style="display:flex;align-items:center;">
          <span style="font-size:14px;font-weight:600;color:rgba(0,0,0,0.9);line-height:20px;cursor:pointer;">{{AUTHOR_NAME}}</span>
        </div>
        <div style="font-size:12px;font-weight:400;color:rgba(0,0,0,0.6);line-height:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px;">{{AUTHOR_HEADLINE}}</div>
        <div style="display:flex;align-items:center;gap:2px;font-size:12px;font-weight:400;color:rgba(0,0,0,0.6);line-height:16px;margin-top:1px;">
          <span>{{TIMESTAMP}}</span>
          <span style="margin:0 2px;">&#183;</span>
          <!-- Globe Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="12" height="12" fill="rgba(0,0,0,0.6)" style="flex-shrink:0;">
            <path d="M8 1a7 7 0 107 7 7 7 0 00-7-7zM3 8a5 5 0 011-3.08 10.66 10.66 0 000 6.16A5 5 0 013 8zm2.05 3.54A8.62 8.62 0 014 8a8.62 8.62 0 011.05-3.54A6.6 6.6 0 018 4a6.6 6.6 0 012.95.46A8.62 8.62 0 0112 8a8.62 8.62 0 01-1.05 3.54A6.6 6.6 0 018 12a6.6 6.6 0 01-2.95-.46zM12 8a5 5 0 01-1 3.08 10.66 10.66 0 000-6.16A5 5 0 0113 8z"/>
          </svg>
        </div>
      </div>

      <!-- Three-dot Menu -->
      <button style="flex-shrink:0;background:transparent;border:none;cursor:pointer;padding:4px;border-radius:50%;margin-top:-2px;margin-right:-4px;" title="Mer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="rgba(0,0,0,0.6)">
          <circle cx="5" cy="12" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="19" cy="12" r="2"/>
        </svg>
      </button>
    </div>

    <!-- ========== POST BODY ========== -->
    <div style="padding:8px 16px 0 16px;">
      <div style="font-size:14px;line-height:20px;font-weight:400;color:rgba(0,0,0,0.9);white-space:pre-line;word-wrap:break-word;overflow-wrap:break-word;">{{POST_TEXT}}<span class="li-see-more">...se mer</span></div>
    </div>

    <!-- ========== HASHTAGS ========== -->
    <div style="padding:4px 16px 0 16px;font-size:14px;line-height:20px;">
      <span class="li-hashtag">{{HASHTAGS}}</span>
    </div>

    <!-- ========== ENGAGEMENT STATS ========== -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px 0 16px;">

      <!-- Reaction Emojis + Count -->
      <div style="display:flex;align-items:center;gap:4px;" class="li-stats-link">
        <div style="display:flex;align-items:center;">
          <!-- Like emoji circle -->
          <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#0A66C2;border:2px solid #ffffff;position:relative;z-index:3;font-size:10px;line-height:1;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="10" height="10" fill="#ffffff">
              <path d="M8.88 1.7a.5.5 0 00-.87 0L6.2 5.27a.5.5 0 01-.38.27H2.5A1.5 1.5 0 001 7.04v5.96A1.5 1.5 0 002.5 14.5h2a.5.5 0 01.5.5v0a.5.5 0 00.5.5h6.4a1.5 1.5 0 001.45-1.12l1.5-5.8A1.5 1.5 0 0013.4 7H10a.5.5 0 01-.5-.56l.34-3.06a1.13 1.13 0 00-.96-1.68z"/>
            </svg>
          </span>
          <!-- Heart emoji circle -->
          <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#DF704D;border:2px solid #ffffff;position:relative;z-index:2;margin-left:-4px;font-size:10px;line-height:1;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="10" height="10" fill="#ffffff">
              <path d="M8 14s-5.5-3.5-5.5-7.5C2.5 4 4.5 2.5 6 2.5c1 0 1.7.5 2 1 .3-.5 1-1 2-1 1.5 0 3.5 1.5 3.5 4.5S8 14 8 14z"/>
            </svg>
          </span>
          <!-- Clap emoji circle -->
          <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#6DAE4F;border:2px solid #ffffff;position:relative;z-index:1;margin-left:-4px;font-size:11px;line-height:1;">
            <span style="filter:brightness(0) invert(1);font-size:10px;">&#128079;</span>
          </span>
        </div>
        <span style="font-size:12px;font-weight:400;color:rgba(0,0,0,0.6);">{{REACTION_COUNT}}</span>
      </div>

      <!-- Comment & Share Count -->
      <div style="display:flex;align-items:center;gap:4px;font-size:12px;font-weight:400;color:rgba(0,0,0,0.6);">
        <span class="li-stats-link">{{COMMENT_COUNT}} kommentarer</span>
        <span>&#183;</span>
        <span class="li-stats-link">{{SHARE_COUNT}} delinger</span>
      </div>
    </div>

    <!-- ========== ACTION BAR ========== -->
    <div style="margin:8px 16px 0 16px;border-top:1px solid rgba(0,0,0,0.08);"></div>
    <div style="display:flex;align-items:center;padding:2px 8px 4px 8px;">

      <!-- Like -->
      <button class="li-post-action-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="rgba(0,0,0,0.6)">
          <path d="M19.46 11l-3.91-3.91a7 7 0 01-1.69-2.74l-.49-1.47A2.76 2.76 0 0010.76 1 2.75 2.75 0 008 3.74v1.12a9.19 9.19 0 00.46 2.85L8.89 9H4.12A2.12 2.12 0 002 11.12a2.16 2.16 0 00.92 1.76A2.11 2.11 0 002 14.62a2.14 2.14 0 001.28 2 2 2 0 00-.28 1 2.12 2.12 0 002 2.12v.14A2.12 2.12 0 007.12 22h7.49a8.08 8.08 0 003.58-.84l.31-.16H21V11zM19.5 19.5h-.83l-.63.32a6.09 6.09 0 01-2.7.68H7.12a.62.62 0 01-.62-.62v-.14a.61.61 0 01.62-.62h.62v-1.5H6.12a.62.62 0 010-1.24h1.62v-1.5H5.12a.65.65 0 01-.62-.62.65.65 0 01.62-.63h2.62v-1.5H4.12a.62.62 0 01-.62-.63.62.62 0 01.62-.62h7.49a.5.5 0 00.48-.36l-.78-2.32a7.09 7.09 0 01-.36-2.24V3.74a1.26 1.26 0 011.26-1.24 1.26 1.26 0 011.18.91l.49 1.47a8.99 8.99 0 002.15 3.5l3.47 3.47z"/>
        </svg>
        <span>Lik</span>
      </button>

      <!-- Comment -->
      <button class="li-post-action-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="rgba(0,0,0,0.6)">
          <path d="M7 9h10v1.5H7zm0 4h7v-1.5H7zm16-2a9.5 9.5 0 01-14.72 7.94l-4.6 1.33 1.53-4.16A9.49 9.49 0 013.5 11 9.5 9.5 0 0113 1.5 9.5 9.5 0 0123 11zm-1.5 0A8 8 0 0013 3 8 8 0 005 11a8 8 0 001.45 4.56l.37.53-.6 1.63 1.82-.53.52.34A8 8 0 0021.5 11z"/>
        </svg>
        <span>Kommenter</span>
      </button>

      <!-- Repost -->
      <button class="li-post-action-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="rgba(0,0,0,0.6)">
          <path d="M13.96 5H6c-1.1 0-2 .9-2 2v5.5h1.5V7c0-.28.22-.5.5-.5h7.96l-2.73 2.73 1.06 1.06L16.5 6l-4.21-4.21-1.06 1.06zM10.04 19H18c1.1 0 2-.9 2-2v-5.5h-1.5V17c0 .28-.22.5-.5.5h-7.96l2.73-2.73-1.06-1.06L7.5 18l4.21 4.21 1.06-1.06z"/>
        </svg>
        <span>Del innlegg</span>
      </button>

      <!-- Send -->
      <button class="li-post-action-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="rgba(0,0,0,0.6)">
          <path d="M21 3L0 10l7.66 4.26L20 6l-8.26 12.34L16 14l5-11zM6.39 12.06L2.31 10l14.49-4.86zM13.94 17.69L12 13.61 18.86 5.3z"/>
        </svg>
        <span>Send</span>
      </button>
    </div>

  </div>
</div>
